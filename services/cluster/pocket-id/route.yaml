apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pocket-id
  namespace: cloudijs-system
spec:
  parentRefs:
    - name: shared-gateway-http
      namespace: cloudijs-system
      sectionName: auth-cloudijs-nl-http
    - name: shared-gateway-http
      namespace: cloudijs-system
      sectionName: auth-cloudijs-nl-https
  hostnames:
    - auth.cloudijs.nl
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: pocket-id
          port: 1411