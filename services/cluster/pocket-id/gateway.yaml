apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: pocket-id-gateway
  namespace: cloudijs-system
  annotations:
    cert-manager.io/issuer: pocket-id-issuer
spec:
  gatewayClassName: cilium
  infrastructure:
    annotations:
      load-balancer.hetzner.cloud/name: "platform-gateway-shared"
      load-balancer.hetzner.cloud/location: "nbg1"
      load-balancer.hetzner.cloud/uses-proxyprotocol: "true"
  listeners:
    - name: http
      hostname: auth.cloudijs.nl
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      hostname: auth.cloudijs.nl
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: auth-cloudijs-nl-tls
            kind: Secret
            group: ""
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pocket-id
  namespace: cloudijs-system
spec:
  parentRefs:
    - name: pocket-id-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: pocket-id
          port: 1411
