apiVersion: apps/v1
kind: Deployment
metadata:
  name: pocket-id
  namespace: cloudijs-system
  labels:
    app: pocket-id
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pocket-id
  template:
    metadata:
      labels:
        app: pocket-id
    spec:
      containers:
        - name: pocket-id
          image: ghcr.io/pocket-id/pocket-id:v2
          env:
            - name: APP_URL
              value: https://auth.cloudijs.nl
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: pocket-id-secrets
                  key: encryption-key
            - name: VERSION_CHECK_DISABLED
              value: true
            - name: ANALYTICS_DISABLED
              value: true
          ports:
            - containerPort: 1411
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            exec:
              command: ["/app/pocket-id", "healthcheck"]
            initialDelaySeconds: 10
            periodSeconds: 90
            timeoutSeconds: 5
            failureThreshold: 2
          livenessProbe:
            exec:
              command: ["/app/pocket-id", "healthcheck"]
            initialDelaySeconds: 10
            periodSeconds: 90
            timeoutSeconds: 5
            failureThreshold: 2
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pocket-id-data
