apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sample-nginx
  namespace: apps
spec:
  parentRefs:
    - name: shared-gateway-http
      namespace: cloudijs-system
  hostnames:
    - test.cloudijs.nl
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: sample-nginx
          port: 80
  tls:
    certificateRefs:
      - name: test-cloudijs-nl-tls
        kind: Secret
        group: ""
